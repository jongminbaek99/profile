<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jade | Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <nav class="nav">
        <a href="#" class="nav-logo">Jade</a>
        <ul class="nav-links">
          <li><a href="#about">소개</a></li>
          <li><a href="#skills">스킬</a></li>
          <li><a href="#projects">프로젝트</a></li>
          <li><a href="#contact">연락처</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-content">
          <div class="profile-image-wrapper">
            <img
              src="assets/images/profile_image.png"
              alt="Profile"
              class="profile-image"
            />
          </div>
          <h1 class="hero-title">
            안녕하세요, <span class="highlight">Jade</span>입니다
          </h1>
          <p class="hero-subtitle" id="hero-subtitle">로딩 중…</p>
        </div>
      </section>

      <section id="about" class="section">
        <h2 class="section-title">소개</h2>
        <p class="section-text" id="about-text">로딩 중…</p>
      </section>

      <section id="skills" class="section">
        <h2 class="section-title">스킬</h2>
        <ul class="skills-list" id="skills-list">
          <li>로딩 중…</li>
        </ul>
      </section>

      <section id="projects" class="section">
        <h2 class="section-title">프로젝트</h2>
        <div class="projects-grid">
          <article class="project-card" id="project1">
            <h3>로딩 중…</h3>
            <p>로딩 중…</p>
          </article>
          <article class="project-card" id="project2">
            <h3>로딩 중…</h3>
            <p>로딩 중…</p>
          </article>
        </div>
      </section>

      <section id="contact" class="section">
        <h2 class="section-title">연락처</h2>
        <div class="contact-links">
          <button
            type="button"
            class="contact-link contact-link-btn"
            id="email-btn"
          >
            Email
          </button>
          <a
            href="https://github.com/jongminbaek99"
            class="contact-link"
            target="_blank"
            rel="noopener"
            >GitHub</a
          >
          <a
            href="https://linkedin.com/in/placeholder"
            class="contact-link"
            target="_blank"
            rel="noopener"
            >LinkedIn</a
          >
        </div>
      </section>
    </main>

    <!-- Email Popup -->
    <div id="email-popup" class="popup-overlay" aria-hidden="true">
      <div class="popup">
        <button type="button" class="popup-close" aria-label="닫기">
          &times;
        </button>
        <p class="popup-label">이메일 주소</p>
        <div class="popup-email-row">
          <span class="popup-email" id="popup-email-text"
            >rootbaeck90@gmail.com</span
          >
          <button type="button" class="popup-copy-btn" id="copy-btn">
            복사하기
          </button>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2026 Jade. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
